<svg width="344" height="154.5" viewBox="0 0 344 154.5" fill="none" xmlns="http://www.w3.org/2000/svg">

  <style>
    .header {
      font: 600 16px "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      fill: #1F2328;
    }

    .lang-name {
      font-family: "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 12px;
    }

    .lang-name-bold {
      font-weight: 600;
      fill: #1F2328;
    }

    .lang-percent {
      font-weight: 400;
      fill: #59636E;
    }
  </style>

  <rect height="100%" width="100%" fill="#FFFFFF" rx="6" ry="6" stroke="#DFE4E9" stroke-width="2"/>

  <g transform="translate(24, 0)">
    <g transform="translate(0, 36)">
      <text class="header">Languages</text>
    </g>

    <g transform="translate(0, 48)">
      <svg height="8" width="296" xmlns="http://www.w3.org/2000/svg">
        <mask id="rect-mask">
          <rect x="0" y="0" width="100%" height="100%" fill="white" rx="5"/>
        </mask>
        <circle id="legend-dot" cx="5" cy="6" r="4.5"/>

        
        
          <rect mask="url(#rect-mask)" x="0%" y="0" width="29.4%" height="100%" fill="#f1e05a"/>
          
        
          <rect mask="url(#rect-mask)" x="29.4%" y="0" width="26.5%" height="100%" fill="#b07219"/>
           
            <rect x="29.4%" y="0" width="0.6%" height="100%" fill="#FFFFFF"/>
          
        
          <rect mask="url(#rect-mask)" x="55.9%" y="0" width="20.6%" height="100%" fill="#00ADD8"/>
           
            <rect x="55.9%" y="0" width="0.6%" height="100%" fill="#FFFFFF"/>
          
        
          <rect mask="url(#rect-mask)" x="76.5%" y="0" width="17.2%" height="100%" fill="#3572A5"/>
           
            <rect x="76.5%" y="0" width="0.6%" height="100%" fill="#FFFFFF"/>
          
        
          <rect mask="url(#rect-mask)" x="93.7%" y="0" width="3.8%" height="100%" fill="#A97BFF"/>
           
            <rect x="93.7%" y="0" width="0.6%" height="100%" fill="#FFFFFF"/>
          
        
          <rect mask="url(#rect-mask)" x="97.5%" y="0" width="2.5%" height="100%" fill="#3178c6"/>
           
            <rect x="97.5%" y="0" width="0.6%" height="100%" fill="#FFFFFF"/>
          
        
      </svg>

      
        
          <g transform="translate(0, 25)">
            <circle cx="5" cy="6" r="4.5" fill="#f1e05a"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">JavaScript</tspan>
              <tspan class="lang-percent">29.4%</tspan>
            </text>
          </g>
        
          <g transform="translate(150, 25)">
            <circle cx="5" cy="6" r="4.5" fill="#b07219"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">Java</tspan>
              <tspan class="lang-percent">26.5%</tspan>
            </text>
          </g>
        
          <g transform="translate(0, 45)">
            <circle cx="5" cy="6" r="4.5" fill="#00ADD8"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">Go</tspan>
              <tspan class="lang-percent">20.6%</tspan>
            </text>
          </g>
        
          <g transform="translate(150, 45)">
            <circle cx="5" cy="6" r="4.5" fill="#3572A5"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">Python</tspan>
              <tspan class="lang-percent">17.2%</tspan>
            </text>
          </g>
        
          <g transform="translate(0, 65)">

          <g transform="translate(150, 65)">
            <circle cx="5" cy="6" r="4.5" fill="#3178c6"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">TypeScript</tspan>
              <tspan class="lang-percent">2.5%</tspan>
            </text>

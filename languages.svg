<svg width="344" height="154.5" viewBox="0 0 344 154.5" fill="none" xmlns="http://www.w3.org/2000/svg">

  <style>
    .header {
      font: 600 16px "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      fill: #F0F6FC;
    }

    .lang-name {
      font-family: "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 12px;
    }

    .lang-name-bold {
      font-weight: 600;
      fill: #F0F6FC;
    }

    .lang-percent {
      font-weight: 400;
      fill: #9198A1;
    }
  </style>

  <rect height="100%" width="100%" fill="#0D1117" rx="6" ry="6" stroke="#2F353D" stroke-width="2"/>

  <g transform="translate(24, 0)">
    <g transform="translate(0, 36)">
      <text class="header">Languages</text>
    </g>

    <g transform="translate(0, 48)">
      <svg height="8" width="296" xmlns="http://www.w3.org/2000/svg">
        <mask id="rect-mask">
          <rect x="0" y="0" width="100%" height="100%" fill="white" rx="5"/>
        </mask>
        <circle id="legend-dot" cx="5" cy="6" r="4.5"/>

        
        
          <rect mask="url(#rect-mask)" x="0%" y="0" width="77.9%" height="100%" fill="#DA5B0B"/>
          
        
          <rect mask="url(#rect-mask)" x="77.9%" y="0" width="7.1%" height="100%" fill="#b07219"/>
           
            <rect x="77.9%" y="0" width="0.6%" height="100%" fill="#0D1117"/>
          
        
          <rect mask="url(#rect-mask)" x="85%" y="0" width="5.2%" height="100%" fill="#f1e05a"/>
           
            <rect x="85%" y="0" width="0.6%" height="100%" fill="#0D1117"/>
          
        
          <rect mask="url(#rect-mask)" x="90.2%" y="0" width="4.5%" height="100%" fill="#3572A5"/>
           

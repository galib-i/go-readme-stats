          <rect mask="url(#rect-mask)" x="97.9%" y="0" width="2.2%" height="100%" fill="#F0F6FC"/>
           
            <rect x="97.9%" y="0" width="0.6%" height="100%" fill="#0D1117"/>
          
        
      </svg>

      
        
          <g transform="translate(0, 25)">
            <circle cx="5" cy="6" r="4.5" fill="#DA5B0B"/>
            <text x="18" y="10.5" class="lang-name">
              <tspan class="lang-name-bold">Jupyter Note...</tspan>
